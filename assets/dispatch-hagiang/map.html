<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hà Giang Loop — Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ============================================================
   PALETTE — edit these to recolor the whole map
   ============================================================ */
:root{
  --paper:#f4efe4;        /* sidebar background        */
  --paper-card:#fbf7ee;   /* cards / popups            */
  --paper-edge:#ddd0b8;   /* borders & dividers        */
  --ink:#241d13;          /* headings                  */
  --ink-soft:#5c5141;     /* body text                 */
  --ink-faint:#8a7c64;    /* labels / meta             */
  --kicker:#a8703f;       /* small uppercase accent    */
  --route:#4a3a28;        /* the drawn road line       */
  --route-casing:#fffaf0; /* road outline              */
  /* per-day pin & accent colors (Day 0 = arrival) */
  --day0:#7d7466;
  --day1:#c2603a;
  --day2:#3f7d6e;
  --day3:#3a5fa0;
  --day4:#9a5a8c;
  --day5:#b88a2a;
}
/* ============================================================ */
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--paper);}
.hg-wrap{display:flex;height:100vh;width:100vw;overflow:hidden;font-family:'Public Sans',sans-serif;color:var(--ink-soft);background:var(--paper);}
.hg-side{width:392px;flex:none;height:100%;overflow-y:auto;background:var(--paper);border-right:1px solid var(--paper-edge);}
.hg-side::-webkit-scrollbar{width:9px;}
.hg-side::-webkit-scrollbar-thumb{background:#cdbfa6;border-radius:8px;border:2px solid var(--paper);}
.hg-head{padding:34px 30px 22px;border-bottom:1px solid #e3d7be;}
.hg-kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--kicker);font-weight:600;}
.hg-title{font-family:'Marcellus',serif;font-weight:400;font-size:42px;line-height:1.04;margin:14px 0 12px;color:var(--ink);}
.hg-lede{margin:0;font-size:14px;line-height:1.55;color:var(--ink-soft);max-width:300px;}
.hg-stats{display:flex;gap:22px;margin-top:20px;}
.hg-stat-n{font-family:'Marcellus',serif;font-size:26px;color:var(--ink);}
.hg-stat-l{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);}
.hg-allbtn{width:100%;cursor:pointer;border:1px solid #d8cab0;background:var(--paper-card);color:#3a3024;font-size:12px;font-weight:600;letter-spacing:.04em;padding:9px;border-radius:5px;}
.hg-day{margin:10px 0;border:1px solid #e3d7be;border-radius:9px;overflow:hidden;background:var(--paper-card);}
.hg-dayhead{cursor:pointer;display:flex;align-items:center;gap:12px;padding:14px 15px;}
.hg-badge{flex:none;width:30px;height:30px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:'Marcellus',serif;}
.hg-daylabel{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9a8a6e;font-weight:600;}
.hg-daytitle{font-family:'Marcellus',serif;font-size:18px;line-height:1.15;color:var(--ink);}
.hg-daysub{font-size:12px;color:#6f6450;margin-top:1px;}
.hg-row{cursor:pointer;display:flex;align-items:baseline;gap:10px;padding:7px 10px;border-radius:5px;transition:background .12s;}
.hg-row:hover{background:var(--paper);}
.hg-dot{flex:none;width:7px;height:7px;border-radius:50%;transform:translateY(-1px);}
.hg-stopname{flex:1;font-size:13.5px;line-height:1.35;color:#3a3024;}
.hg-stoptype{flex:none;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#b09c7c;}
.hg-lodging{display:flex;align-items:center;gap:8px;margin:6px 8px 4px;padding-top:8px;border-top:1px dashed #e0d4ba;font-size:12px;color:var(--ink-faint);}
.hg-mapwrap{flex:1;position:relative;min-width:0;}
#hg-map{position:absolute;inset:0;}
.hg-toggle{position:absolute;top:16px;right:16px;z-index:500;display:flex;background:var(--paper);border:1px solid #d8cab0;border-radius:7px;overflow:hidden;box-shadow:0 3px 14px rgba(60,45,25,.18);}
.hg-bm{cursor:pointer;border:none;background:var(--paper);color:var(--ink-soft);font-size:12px;font-weight:600;padding:8px 15px;letter-spacing:.04em;}
.hg-bm+.hg-bm{border-left:1px solid #d8cab0;}
.hg-bm.on{background:var(--ink);color:var(--paper);}
.leaflet-popup-content-wrapper{background:var(--paper-card);border-radius:6px;box-shadow:0 6px 22px rgba(60,45,25,.25);}
.leaflet-popup-content{margin:11px 14px;font-family:'Public Sans',sans-serif;color:#2a2218;}
.leaflet-popup-tip{background:var(--paper-card);}
.leaflet-container{background:#dfe6df;font-family:'Public Sans',sans-serif;}
@media(max-width:760px){.hg-wrap{flex-direction:column;}.hg-side{width:100%;height:auto;max-height:46vh;}.hg-mapwrap{flex:1;min-height:54vh;}}
</style>
</head>
<body>
<div class="hg-wrap">
  <aside class="hg-side">
    <div class="hg-head">
      <div class="hg-kicker">Motorbike Loop · Hà Giang, Vietnam</div>
      <h1 class="hg-title">The Hà Giang Loop</h1>
      <p class="hg-lede">~350&nbsp;km over five days through the limestone karst highlands of Vietnam's far north.</p>
      <div class="hg-stats">
        <div><div class="hg-stat-n">5</div><div class="hg-stat-l">Days</div></div>
        <div><div class="hg-stat-n">31</div><div class="hg-stat-l">Stops</div></div>
        <div><div class="hg-stat-n">~350</div><div class="hg-stat-l">km</div></div>
      </div>
    </div>
    <div style="padding:10px 18px 8px;"><button class="hg-allbtn" id="hg-all">Show whole loop</button></div>
    <div id="hg-days" style="padding:4px 18px 26px;"></div>
  </aside>
  <div class="hg-mapwrap">
    <div id="hg-map"></div>
    <div class="hg-toggle">
      <button class="hg-bm on" data-bm="clean">Clean</button>
      <button class="hg-bm" data-bm="terrain">Terrain</button>
    </div>
  </div>
</div>

  d.stops.forEach((s,si)=>{
    const icon=L.divIcon({className:'',iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-26],
      html:`<div style="width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${col};border:2.5px solid #fff;box-shadow:0 2px 6px rgba(40,30,15,.45);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);color:#fff;font-size:11px;font-weight:700;font-family:Marcellus,serif;">${badge}</span></div>`});
    const mk=L.marker([s.lat,s.lng],{icon,riseOnHover:true}).addTo(map);
    const note=s.note?`<div style="font-size:12px;color:#6f6450;margin-top:3px;line-height:1.4;">${s.note}</div>`:'';
    mk.bindPopup(`<div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:${col};font-weight:700;">${d.label} · ${s.type}</div><div style="font-family:Marcellus,serif;font-size:17px;color:var(--ink);margin-top:2px;">${s.name}</div>${note}`);
    markers[di+'-'+si]=mk;
  });
});

function fitAll(){ map.fitBounds(L.latLngBounds(ROUTE),{padding:[50,50]}); }
function fitDay(di){ const pts=DAYS[di].stops.map(s=>[s.lat,s.lng]); pts.length===1?map.flyTo(pts[0],12,{duration:.8}):map.flyToBounds(L.latLngBounds(pts),{padding:[80,80],duration:.8}); }
function openStop(di,si){ const mk=markers[di+'-'+si]; if(!mk)return; map.flyTo(mk.getLatLng(),Math.max(map.getZoom(),13),{duration:.7}); setTimeout(()=>mk.openPopup(),720); }

document.getElementById('hg-all').onclick=fitAll;
document.querySelectorAll('.hg-dayhead').forEach(el=>el.onclick=()=>fitDay(+el.dataset.day));
document.querySelectorAll('.hg-row').forEach(el=>el.onclick=()=>openStop(+el.dataset.di,+el.dataset.si));
document.querySelectorAll('.hg-bm').forEach(b=>b.onclick=()=>{
  const bm=b.dataset.bm; if(bm===current)return;
  map.removeLayer(tiles[current]); tiles[bm].addTo(map); current=bm;
  document.querySelectorAll('.hg-bm').forEach(x=>x.classList.toggle('on',x.dataset.bm===bm));
});
fitAll();
</script>
</body>
