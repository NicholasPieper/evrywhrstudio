<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: oklch(0.984 0.004 170); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  ::selection { background: oklch(0.62 0.10 200 / 0.22); }
  a { -webkit-tap-highlight-color: transparent; }

  @keyframes floaty   { from { transform: translateY(0); } to { transform: translateY(calc(-1 * var(--amt, 8px))); } }
  @keyframes eqbar    { from { height: 6px; } to { height: 100%; } }
  @keyframes marquee  { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes fadein   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes panelin  { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes pinpulse { 0%,100% { box-shadow: 0 0 0 3px transparent; } 50% { box-shadow: 0 0 0 6px oklch(0.62 0.10 200 / 0.22); } }
  @keyframes grainshift {
    0% { transform: translate(0,0); } 33% { transform: translate(-6%,4%); }
    66% { transform: translate(5%,-5%); } 100% { transform: translate(0,0); }
  }

  /* tweaks panel scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: oklch(0.45 0.03 190 / 0.3); border-radius: 999px; }
</style>
